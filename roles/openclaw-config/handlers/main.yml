---
- name: Rebuild egress
  ansible.builtin.command: docker compose build --no-cache openclaw-egress
  args:
    chdir: "{{ openclaw_base_dir }}"
  register: _egress_build
  # Handlers only fire when notified, so changed_when: true is safe here.
  # --no-cache ensures a stale BuildKit layer doesn't silently serve old code
  # when smokescreen_commit changes between runs.
  changed_when: _egress_build.rc == 0

# Handlers below use `docker compose restart` (command) instead of
# community.docker.docker_compose_v2 to gracefully handle partial runs where
# the target service may not exist yet (e.g., --tags config without --tags deploy).
# The custom failed_when logic suppresses "no such service/container" errors.
- name: Probe egress
  ansible.builtin.command: docker compose ps -q openclaw-egress
  args:
    chdir: "{{ openclaw_base_dir }}"
  register: egress_probe
  failed_when: false
  changed_when: false
  listen: Restart egress

- name: Restart egress container
  ansible.builtin.command: docker compose restart openclaw-egress
  args:
    chdir: "{{ openclaw_base_dir }}"
  when: egress_probe.stdout | default('') | trim != ''
  changed_when: true
  listen: Restart egress

- name: Restart litellm
  ansible.builtin.command: docker compose restart litellm
  args:
    chdir: "{{ openclaw_base_dir }}"
  register: restart_litellm_result
  changed_when: restart_litellm_result.rc == 0
  failed_when: >-
    restart_litellm_result.rc != 0 and
    'no such service' not in (restart_litellm_result.stderr | lower) and
    'no such container' not in (restart_litellm_result.stderr | lower)

- name: Restart openclaw
  ansible.builtin.command: docker compose restart openclaw
  args:
    chdir: "{{ openclaw_base_dir }}"
  register: restart_openclaw_result
  changed_when: restart_openclaw_result.rc == 0
  failed_when: >-
    restart_openclaw_result.rc != 0 and
    'no such service' not in (restart_openclaw_result.stderr | lower) and
    'no such container' not in (restart_openclaw_result.stderr | lower)
