---
# Agency Agents: Clone prompt library and deploy into OpenClaw container
# Source: https://github.com/msitarzewski/agency-agents
# These are AI agent personality/prompt files (markdown) — not services.
# Placed in /home/node/.openclaw/agents/ inside the container for reference.

- name: Verify OpenClaw container is running
  ansible.builtin.command: docker inspect --format '{{ '{{' }}.State.Running{{ '}}' }}' openclaw
  register: openclaw_running
  changed_when: false
  check_mode: false
  failed_when: openclaw_running.stdout != 'true'

- name: Create agency-agents staging directory on host
  ansible.builtin.file:
    path: "{{ openclaw_base_dir }}/agency-agents"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Clone agency-agents repository
  ansible.builtin.git:
    repo: "{{ agency_agents_repo }}"
    dest: "{{ openclaw_base_dir }}/agency-agents/repo"
    version: "{{ agency_agents_version }}"
    depth: 1
    force: true
  register: agents_clone
  retries: 3
  delay: 10
  until: agents_clone is not failed

- name: Validate requested divisions exist in cloned repository
  ansible.builtin.stat:
    path: "{{ openclaw_base_dir }}/agency-agents/repo/{{ item }}"
  loop: "{{ agency_agents_divisions }}"
  register: division_checks

- name: Fail if any requested division is missing
  ansible.builtin.fail:
    msg: >
      Division '{{ item.item }}' not found in agency-agents repository.
      Available divisions: engineering, design, marketing, product,
      project-management, testing, support, spatial-computing, specialized.
      Check agency_agents_divisions in vars.yml.
  loop: "{{ division_checks.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: not item.stat.exists

- name: Create agents directory inside container
  ansible.builtin.command: docker exec openclaw mkdir -p /home/node/.openclaw/agents
  changed_when: false
  check_mode: false

- name: Copy agent divisions into container
  ansible.builtin.command: >
    docker cp
    {{ openclaw_base_dir }}/agency-agents/repo/{{ item }}/
    openclaw:/home/node/.openclaw/agents/{{ item }}
  loop: "{{ agency_agents_divisions }}"
  changed_when: false
  check_mode: false

# Agent prompt files are read-only markdown — permission hardening skipped
# because cap_drop=ALL prevents chown/chmod even as root inside the container.

- name: List deployed agent files
  ansible.builtin.command: docker exec openclaw find /home/node/.openclaw/agents -name '*.md' -type f
  register: deployed_agents
  changed_when: false
  check_mode: false

- name: Show deployed agent count
  ansible.builtin.debug:
    msg: "Deployed {{ deployed_agents.stdout_lines | length }} agency-agents prompt files across {{ agency_agents_divisions | length }} divisions"

# ── Vendor Skills (from awesome-agent-skills) ─────────────────────────────
- name: Create vendor skill staging directories on host
  ansible.builtin.file:
    path: "{{ openclaw_base_dir }}/agency-agents/vendor/{{ item.name }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop: "{{ vendor_skills }}"
  loop_control:
    label: "{{ item.name }}"
  when: vendor_skills_enabled | default(false) | bool

- name: Clone vendor skill repositories
  ansible.builtin.git:
    repo: "{{ item.repo }}"
    dest: "{{ openclaw_base_dir }}/agency-agents/vendor/{{ item.name }}/repo"
    version: "{{ item.version }}"
    depth: 1
    force: true
  loop: "{{ vendor_skills }}"
  loop_control:
    label: "{{ item.name }}"
  register: vendor_clone
  retries: 3
  delay: 10
  until: vendor_clone is not failed
  when: vendor_skills_enabled | default(false) | bool

- name: Create vendor skills directory inside container
  ansible.builtin.command: >
    docker exec openclaw mkdir -p /home/node/.openclaw/agents/vendor/{{ item.name }}
  loop: "{{ vendor_skills }}"
  loop_control:
    label: "{{ item.name }}"
  changed_when: false
  check_mode: false
  when: vendor_skills_enabled | default(false) | bool

- name: Copy vendor skills into container
  # Trailing slash on source copies the *contents* of the subdir (individual skill
  # folders) into the per-vendor destination directory, not the subdir itself.
  ansible.builtin.command: >
    docker cp
    {{ openclaw_base_dir }}/agency-agents/vendor/{{ item.name }}/repo/{{ item.subdir }}/
    openclaw:/home/node/.openclaw/agents/vendor/{{ item.name }}
  loop: "{{ vendor_skills }}"
  loop_control:
    label: "{{ item.name }}"
  changed_when: false
  check_mode: false
  when: vendor_skills_enabled | default(false) | bool

# Vendor skill files are read-only markdown — permission hardening skipped
# because cap_drop=ALL prevents chown/chmod even as root inside the container.
- name: Vendor skills permission placeholder
  ansible.builtin.debug:
    msg: "Vendor skills deployed (permissions managed by container security context)"
  changed_when: false
  check_mode: false
  when: vendor_skills_enabled | default(false) | bool

- name: List deployed vendor skill files
  ansible.builtin.command: >
    docker exec openclaw find /home/node/.openclaw/agents/vendor -name '*.md' -type f
  register: deployed_vendor_skills
  changed_when: false
  check_mode: false
  when: vendor_skills_enabled | default(false) | bool

- name: Show deployed vendor skill count
  ansible.builtin.debug:
    msg: >
      Deployed {{ deployed_vendor_skills.stdout_lines | length }} vendor skill files
      across {{ vendor_skills | length }} vendors
      ({{ vendor_skills | map(attribute='name') | join(', ') }})
  when: vendor_skills_enabled | default(false) | bool
