---
# Step 5: Gateway and sandbox hardening
# All config applied via docker exec — idempotent (config set is a no-op if value matches).
#
# Design decision: changed_when: false on all `openclaw config set` tasks.
# The OpenClaw CLI's config set is idempotent — it writes the value regardless of
# current state and returns rc=0 either way, with no "changed" vs "unchanged" output.
# Ansible therefore cannot detect real changes, so we suppress false positives.
# This means --diff output is uninformative for these tasks, but correctness is
# guaranteed by the CLI's own idempotency. check_mode: false ensures verification
# tasks (docker inspect, config get) still run during --check dry runs.

# Discover proxy-net subnet if not already set (e.g., when running --tags harden standalone).
# The deploy role sets this as a fact, but facts don't persist across separate playbook runs.
- name: Discover proxy-net subnet (if not already set)
  when: proxy_net_subnet is not defined
  block:
    - name: Get proxy-net subnet from Docker
      ansible.builtin.command: >
        docker network inspect openclaw_proxy-net
        --format '{{ '{{' }}range .IPAM.Config{{ '}}' }}{{ '{{' }}.Subnet{{ '}}' }}{{ '{{' }}end{{ '}}' }}'
      register: _proxy_subnet_discovery
      changed_when: false
      failed_when: false
      check_mode: false

    - name: Store discovered proxy-net subnet
      ansible.builtin.set_fact:
        proxy_net_subnet: "{{ _proxy_subnet_discovery.stdout }}"
      when: _proxy_subnet_discovery.rc == 0 and _proxy_subnet_discovery.stdout | length > 0

- name: Fail if proxy-net subnet is unknown
  ansible.builtin.fail:
    msg: >
      Cannot determine proxy-net subnet — the openclaw_proxy-net Docker network
      does not exist yet. Run the deploy role first to create the Docker networks:
        ansible-playbook playbook.yml --ask-vault-pass --tags deploy
      Then re-run with --tags harden.
  when: proxy_net_subnet is not defined or proxy_net_subnet | length == 0

- name: Back up OpenClaw config before hardening
  ansible.builtin.command: >
    docker exec openclaw
    cp /root/.openclaw/config.json /root/.openclaw/config.json.bak
  changed_when: false
  failed_when: false
  check_mode: false

# ── Gateway Token ─────────────────────────────────────────────────────
# Detect if the gateway token was rotated by cron (rotate-token.sh) since
# the last playbook run. If so, the on-disk token differs from vault.yml.
# Overwriting it would revert the rotation, breaking existing API clients.
- name: Check for externally rotated gateway token
  ansible.builtin.slurp:
    src: "{{ openclaw_base_dir }}/monitoring/.gateway-token"
  register: _existing_gateway_token
  failed_when: false
  no_log: true

- name: Detect gateway token drift
  ansible.builtin.set_fact:
    _gateway_token_drifted: >-
      {{ _existing_gateway_token is succeeded
         and ((_existing_gateway_token.content | default('') | b64decode | trim) != gateway_token) }}
  no_log: true

- name: Warn about gateway token drift (rotated by cron)
  ansible.builtin.debug:
    msg: >
      WARNING: The on-disk gateway token differs from vault.yml — it was likely
      rotated by cron (rotate-token.sh). Skipping overwrite to preserve the
      rotated token. To force vault.yml's value, re-run with:
        --extra-vars "force_gateway_token=true"
      Then update vault.yml to match: ansible-vault edit group_vars/all/vault.yml
  when: _gateway_token_drifted | bool and not (force_gateway_token | default(false) | bool)

- name: Write gateway token to host file
  ansible.builtin.copy:
    content: "{{ gateway_token }}"
    dest: "{{ openclaw_base_dir }}/monitoring/.gateway-token"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  when: not (_gateway_token_drifted | default(false) | bool) or (force_gateway_token | default(false) | bool)

# block/always guarantees the token file is removed from the container even
# if any auth config command fails — matching the same pattern used for SOUL.md.
- name: Apply gateway auth config with guaranteed token cleanup
  when: not (_gateway_token_drifted | default(false) | bool) or (force_gateway_token | default(false) | bool)
  block:
    - name: Copy gateway token into container
      ansible.builtin.command: >
        docker cp {{ openclaw_base_dir }}/monitoring/.gateway-token openclaw:/tmp/.gw-token
      changed_when: false
      check_mode: false
      no_log: true

    - name: Restrict token file permissions inside container
      ansible.builtin.command: docker exec openclaw chmod 600 /tmp/.gw-token
      changed_when: false
      check_mode: false
      no_log: true

    - name: Apply gateway auth mode
      ansible.builtin.command: >
        docker exec openclaw openclaw config set gateway.auth.mode "token"
      changed_when: false
      check_mode: false

    - name: Apply gateway auth token
      ansible.builtin.command: >
        docker exec openclaw sh -c 'openclaw config set gateway.auth.token "$(cat /tmp/.gw-token)"'
      changed_when: false
      check_mode: false
      no_log: true

    - name: Apply gateway auth allowTailscale
      ansible.builtin.command: >
        docker exec openclaw openclaw config set gateway.auth.allowTailscale false
      changed_when: false
      check_mode: false

  always:
    - name: Remove gateway token file from container
      ansible.builtin.command: docker exec openclaw rm -f /tmp/.gw-token
      changed_when: false
      check_mode: false
      no_log: true

# ── Apply all hardening config ────────────────────────────────────────
- name: Apply gateway network config
  ansible.builtin.command: "docker exec openclaw openclaw config set {{ item.key }} {{ item.value }}"
  loop:
    - { key: 'gateway.bind', value: '"lan"' }
    - { key: 'gateway.trustedProxies', value: "'[\"127.0.0.1\", \"{{ proxy_net_subnet }}\"]'" }
  changed_when: false
  check_mode: false

- name: Apply control UI security
  ansible.builtin.command: "docker exec openclaw openclaw config set {{ item.key }} {{ item.value }}"
  loop:
    - { key: 'gateway.controlUi.allowedOrigins', value: "'[\"https://{{ domain }}\"]'" }
    - { key: 'gateway.controlUi.allowInsecureAuth', value: 'false' }
    - { key: 'gateway.controlUi.dangerouslyDisableDeviceAuth', value: 'false' }
  changed_when: false
  check_mode: false

- name: Wait for openclaw container to be running
  ansible.builtin.command: docker inspect openclaw --format={{ '{{' }}.State.Status{{ '}}' }}
  register: _oc_state
  until: _oc_state.stdout == "running"
  retries: 12
  delay: 5
  changed_when: false
  check_mode: false

- name: Apply discovery and browser config
  ansible.builtin.command: "docker exec openclaw openclaw config set {{ item.key }} {{ item.value }}"
  loop:
    - { key: 'discovery.mdns.mode', value: '"off"' }
    - { key: 'gateway.nodes.browser.mode', value: '"off"' }
  changed_when: false
  check_mode: false
  register: _disc_result
  until: _disc_result.rc == 0
  retries: 6
  delay: 5

- name: Apply logging config
  ansible.builtin.command: "docker exec openclaw openclaw config set {{ item.key }} {{ item.value }}"
  loop:
    - { key: 'logging.redactSensitive', value: '"tools"' }
    - { key: 'logging.file', value: '"/home/node/.openclaw/logs/openclaw.log"' }
  changed_when: false
  check_mode: false

- name: Apply session and plugin config
  ansible.builtin.command: "docker exec openclaw openclaw config set {{ item.key }} {{ item.value }}"
  loop:
    - { key: 'session.dmScope', value: '"per-channel-peer"' }
    - { key: 'plugins.allow', value: "'[]'" }
  changed_when: false
  check_mode: false

- name: Apply sandbox isolation config
  ansible.builtin.command: "docker exec openclaw openclaw config set {{ item.key }} {{ item.value }}"
  loop:
    - { key: 'agents.defaults.sandbox.mode', value: '"all"' }
    - { key: 'agents.defaults.sandbox.scope', value: '"agent"' }
    - { key: 'agents.defaults.sandbox.workspaceAccess', value: '"none"' }
    - { key: 'agents.defaults.sandbox.docker.network', value: '"none"' }
    - { key: "agents.defaults.sandbox.docker.capDrop", value: "'[\"ALL\"]'" }
  changed_when: false
  check_mode: false

- name: Apply sandbox resource caps
  ansible.builtin.command: "docker exec openclaw openclaw config set {{ item.key }} {{ item.value }}"
  loop:
    - { key: 'agents.defaults.sandbox.docker.memorySwap', value: '"{{ sandbox_memory_swap }}"' }
    - { key: 'agents.defaults.sandbox.docker.pidsLimit', value: '{{ sandbox_pids_limit }}' }
    - { key: 'agents.defaults.sandbox.docker.ulimits.nofile.soft', value: '1024' }
    - { key: 'agents.defaults.sandbox.docker.ulimits.nofile.hard', value: '2048' }
  changed_when: false
  check_mode: false

# sandbox lifecycle keys (idleHours, maxAgeDays) removed — not supported in this OpenClaw version

# token cost optimization keys (maxTokens, model.heartbeat) removed — not supported in this OpenClaw version

- name: Apply tool denials (gateway level)
  ansible.builtin.command: >
    docker exec openclaw openclaw config set gateway.tools.deny
    '{{ openclaw_gateway_tool_denials | to_json }}'
  changed_when: false
  check_mode: false
  register: _tool_deny_result
  until: _tool_deny_result.rc == 0
  retries: 6
  delay: 5

# agent-level tool denials, groupChat, and channel wildcard policies
# removed — not supported in this OpenClaw version

# ── SOUL.md ───────────────────────────────────────────────────────────
# block/always guarantees staging file removal even if docker cp fails.
- name: Deploy SOUL.md into container
  block:
    - name: Render SOUL.md to host staging file
      ansible.builtin.template:
        src: SOUL.md.j2
        dest: "{{ openclaw_base_dir }}/monitoring/.SOUL.md"
        owner: root
        group: root
        mode: "0644"

    - name: Copy SOUL.md into container
      ansible.builtin.command: docker cp {{ openclaw_base_dir }}/monitoring/.SOUL.md openclaw:/home/node/.openclaw/SOUL.md
      changed_when: false
      check_mode: false

  always:
    - name: Remove SOUL.md staging file from host
      ansible.builtin.file:
        path: "{{ openclaw_base_dir }}/monitoring/.SOUL.md"
        state: absent

# ── File Permissions ──────────────────────────────────────────────────
# File permission lockdown skipped — cap_drop=ALL prevents chmod/chown
# inside the container, and the security context already restricts access.

# ── Verify and Fix ────────────────────────────────────────────────────
- name: Run security audit with auto-fix
  ansible.builtin.command: docker exec openclaw openclaw security audit --deep --fix
  register: security_audit
  changed_when: false
  check_mode: false

- name: Run doctor check
  ansible.builtin.command: docker exec openclaw openclaw doctor
  register: doctor_check
  changed_when: false
  check_mode: false

- name: Show security audit result
  ansible.builtin.debug:
    var: security_audit.stdout_lines

# ── Restart to apply config ───────────────────────────────────────────
# Use docker_compose_v2 module for consistent change detection and FQCN compliance.
- name: Restart OpenClaw to apply hardening
  community.docker.docker_compose_v2:
    project_src: "{{ openclaw_base_dir }}"
    services:
      - openclaw
    state: restarted

- name: Wait for OpenClaw to become healthy after hardening restart
  ansible.builtin.command: >
    docker inspect openclaw
    --format '{{ docker_health_format }}'
  register: harden_health_check
  until: harden_health_check.stdout in ['healthy', 'running']
  retries: 18
  delay: 10
  changed_when: false
  check_mode: false
