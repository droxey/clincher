---
# Molecule test for openclaw-harden role — validates template rendering
# Uses delegated driver since handlers require Docker (unavailable in CI).
driver:
  name: default
  options:
    managed: false
    login_cmd_template: ""
    ansible_connection_options:
      ansible_connection: local

platforms:
  - name: localhost
    managed: false

provisioner:
  name: ansible
  playbooks:
    converge: converge.yml
    verify: verify.yml
  config_options:
    defaults:
      callbacks_enabled: profile_tasks
  inventory:
    host_vars:
      localhost:
        ansible_connection: local
        ansible_python_interpreter: "{{ ansible_playbook_python }}"

verifier:
  name: ansible

scenario:
  name: default
  test_sequence:
    - dependency
    - syntax
    - converge
    - verify
    - cleanup
