---
# Steps 6-8: API keys, model config, Telegram channel, memory/RAG

# ── Step 6: API Keys and Model Configuration ─────────────────────────
# agents.defaults.apiBase removed — not supported in this OpenClaw version
# LiteLLM proxy is configured via container environment variables instead

- name: Set default model
  ansible.builtin.command: >
    docker exec openclaw openclaw config set agents.defaults.model
    "{{ openclaw_default_model }}"
  changed_when: false
  check_mode: false

# Voyage API key is passed via Docker Compose .env file (deployed by openclaw-config role).
# No additional container-level .env injection needed.

# ── Step 7: Channel Integration (Telegram) ───────────────────────────
# Telegram bot token is passed via Docker Compose .env file (TELEGRAM_BOT_TOKEN).
# Channel configuration uses `openclaw channels add` interactively or environment
# variables — config set channels.telegram.* is not supported in this version.
- name: Verify Telegram environment variable is set in container
  ansible.builtin.command: docker exec openclaw sh -c 'test -n "$TELEGRAM_BOT_TOKEN" && echo "TELEGRAM_BOT_TOKEN is set"'
  changed_when: false
  check_mode: false
  failed_when: false
  register: telegram_env_check
  when: telegram_enabled | bool

- name: Show Telegram config status
  ansible.builtin.debug:
    msg: "{{ 'Telegram bot token is configured via environment' if telegram_env_check.rc == 0 else 'WARNING: TELEGRAM_BOT_TOKEN not found in container environment — add it to .env and restart' }}"
  when: telegram_enabled | bool

# ── Step 8: Memory and RAG Configuration ─────────────────────────────
# memory.provider and memory.voyage.model config keys removed — not supported
# in this OpenClaw version. Memory/RAG is configured via VOYAGE_API_KEY env var
# which is already set in the container's .env file above.

- name: Check memory status
  ansible.builtin.command: docker exec openclaw openclaw memory status
  register: memory_status
  changed_when: false
  check_mode: false
  failed_when: false

- name: Show memory status
  ansible.builtin.debug:
    msg: "{{ memory_status.stdout | default('Memory status check not available') }}"

# ── Restart to apply all integration config ───────────────────────────
# Use docker_compose_v2 module for consistent change detection and FQCN compliance.
- name: Restart OpenClaw to apply integration config
  community.docker.docker_compose_v2:
    project_src: "{{ openclaw_base_dir }}"
    services:
      - openclaw
    state: restarted

- name: Wait for OpenClaw to become healthy after integration restart
  ansible.builtin.command: >
    docker inspect openclaw
    --format '{{ docker_health_format }}'
  register: integrate_health_check
  until: integrate_health_check.stdout in ['healthy', 'running']
  retries: 18
  delay: 10
  changed_when: false
  check_mode: false
