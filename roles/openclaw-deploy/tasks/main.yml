---
# Step 4: Build egress image, deploy containers, verify health

- name: Pull container images
  community.docker.docker_image:
    name: "{{ item }}"
    source: pull
  loop:
    - "ghcr.io/openclaw/openclaw:{{ openclaw_version }}"
    - "ghcr.io/tecnativa/docker-socket-proxy:{{ docker_proxy_version }}"
    - "ghcr.io/berriai/litellm:{{ litellm_version }}"
    - "redis/redis-stack-server:{{ redis_version }}"
  register: image_pull
  retries: 3
  delay: 10
  until: image_pull is not failed

# BuildKit (default in Docker 23+) writes build output to stderr, not stdout.
# Check both streams so changed_when doesn't always report "no change".
# Retry up to 3 times — Go module downloads can fail on transient network errors.
- name: Build Smokescreen egress proxy image
  ansible.builtin.command: docker compose build openclaw-egress
  args:
    chdir: "{{ openclaw_base_dir }}"
  register: smokescreen_build
  retries: 3
  delay: 15
  until: smokescreen_build.rc == 0
  changed_when: >
    'Successfully built' in (smokescreen_build.stdout + smokescreen_build.stderr) or
    'exporting to image' in (smokescreen_build.stdout + smokescreen_build.stderr)

- name: Start OpenClaw stack
  community.docker.docker_compose_v2:
    project_src: "{{ openclaw_base_dir }}"
    state: present
  register: compose_result

# Use the same format string as the verify role: containers without a HEALTHCHECK
# defined return empty string from .State.Health.Status — guard with {{if .State.Health}}
# and fall back to "running" so those containers don't spin until timeout.
# Retries: 36 × 10s = 6 min — enough for smokescreen's Go multi-stage build on first pull.
- name: Wait for all containers to become healthy
  ansible.builtin.command: >
    docker inspect {{ item }}
    --format '{{ docker_health_format }}'
  register: health_check
  until: health_check.stdout in ['healthy', 'running']
  retries: 36
  delay: 10
  changed_when: false
  loop:
    - openclaw-docker-proxy
    - openclaw-egress
    - openclaw-redis
    - openclaw-litellm
    - openclaw

# ── Discover proxy-net subnet for trustedProxies (used by harden role) ─
- name: Get proxy-net subnet
  ansible.builtin.command: >
    docker network inspect openclaw_proxy-net
    --format '{{ '{{' }}range .IPAM.Config{{ '}}' }}{{ '{{' }}.Subnet{{ '}}' }}{{ '{{' }}end{{ '}}' }}'
  register: proxy_subnet_result
  changed_when: false

- name: Store proxy-net subnet as fact
  ansible.builtin.set_fact:
    proxy_net_subnet: "{{ proxy_subnet_result.stdout }}"
