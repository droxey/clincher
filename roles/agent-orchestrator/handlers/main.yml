---
- name: Build agent-orchestrator
  ansible.builtin.shell: |
    set -euo pipefail
    pnpm install
    pnpm build
  args:
    chdir: "{{ agent_orchestrator_install_dir }}/repo"
    executable: /bin/bash
  become: true
  become_user: "{{ deploy_user }}"
  changed_when: true
  notify: Link ao CLI globally

- name: Link ao CLI globally
  ansible.builtin.command:
    cmd: pnpm link --global --global-bin-dir /usr/local/bin
    chdir: "{{ agent_orchestrator_install_dir }}/repo"
  become: true
  changed_when: true

- name: Restart agent-orchestrator
  ansible.builtin.systemd:
    name: agent-orchestrator
    state: restarted
    daemon_reload: true
