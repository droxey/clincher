---
# Steps 1-2: SSH hardening, Docker, system tuning, firewall, fail2ban

# ── SSH Hardening ─────────────────────────────────────────────────────
- name: Create deploy user
  ansible.builtin.user:
    name: "{{ deploy_user }}"
    groups: sudo
    append: true
    shell: /bin/bash
    create_home: true

- name: Ensure .ssh directory exists for deploy user
  ansible.builtin.file:
    path: "/home/{{ deploy_user }}/.ssh"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0700"

# Guard: generate the keypair if the file doesn't exist yet (e.g., --tags base
# run without bootstrap, or non-standard key path). lookup('file') hard-fails
# if the path is missing, so we ensure it exists before calling it.
- name: Generate local SSH keypair if missing
  ansible.builtin.command:
    cmd: ssh-keygen -t ed25519 -f {{ local_ssh_key_path }} -N "" -C "deploy@clincher"
  args:
    creates: "{{ local_ssh_key_path }}"
  delegate_to: localhost
  become: false

- name: Push local SSH key to deploy user (if not already present)
  ansible.builtin.copy:
    content: "{{ lookup('file', local_ssh_key_path + '.pub') }}\n"
    dest: "/home/{{ deploy_user }}/.ssh/authorized_keys"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0600"
    force: false

- name: Grant deploy user passwordless sudo
  ansible.builtin.copy:
    content: "{{ deploy_user }} ALL=(ALL) NOPASSWD: ALL\n"
    dest: "/etc/sudoers.d/{{ deploy_user }}"
    owner: root
    group: root
    mode: "0440"
    validate: "visudo -cf %s"

- name: Deploy SSH hardening config
  ansible.builtin.template:
    src: 99-hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/99-hardening.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload ssh

# ── Docker Installation (via official APT repo — GPG-signed packages) ────
- name: Install Docker APT prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Create Docker APT keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: false
  retries: 3
  delay: 5
  register: docker_gpg_download
  until: docker_gpg_download is not failed

- name: Add Docker APT repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu
      {{ ansible_distribution_release }} stable
    state: present
    filename: docker

- name: Install Docker CE (pinned version)
  ansible.builtin.apt:
    name:
      - "docker-ce={{ docker_ce_version }}"
      - "docker-ce-cli={{ docker_ce_version }}"
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Ensure Docker service is started and enabled
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Add deploy user to docker group
  ansible.builtin.user:
    name: "{{ deploy_user }}"
    groups: docker
    append: true

- name: Verify Docker Compose v2
  ansible.builtin.command: docker compose version
  register: compose_check
  changed_when: false
  check_mode: false

# ── Docker Daemon Tuning ──────────────────────────────────────────────
- name: Create /etc/docker directory
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    mode: "0755"

- name: Deploy Docker daemon config
  ansible.builtin.template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
  notify: Restart docker

# ── System Tuning ─────────────────────────────────────────────────────
- name: Deploy sysctl tuning
  ansible.builtin.template:
    src: 99-openclaw.conf.j2
    dest: /etc/sysctl.d/99-openclaw.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload sysctl

# ── Firewall ──────────────────────────────────────────────────────────
- name: Install UFW and fail2ban
  ansible.builtin.apt:
    name:
      - ufw
      - fail2ban
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Set UFW default deny incoming
  community.general.ufw:
    direction: incoming
    default: deny

- name: Set UFW default allow outgoing
  community.general.ufw:
    direction: outgoing
    default: allow

- name: Allow SSH from admin IP (rate limited)
  community.general.ufw:
    rule: limit
    from_ip: "{{ admin_ip }}"
    to_port: "{{ ssh_port }}"
    proto: tcp

- name: Deploy fail2ban SSH jail
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban

- name: Fetch Cloudflare IPv4 ranges
  ansible.builtin.uri:
    url: https://www.cloudflare.com/ips-v4
    return_content: true
    timeout: 30
  register: cf_ipv4
  retries: 3
  delay: 5
  until: cf_ipv4 is not failed
  # Tailscale deployments don't use Cloudflare ingress rules; allow graceful skip.
  ignore_errors: "{{ reverse_proxy == 'tailscale' }}"

- name: Fail if Cloudflare IP fetch failed for non-Tailscale deployment
  ansible.builtin.fail:
    msg: >
      Failed to fetch Cloudflare IP ranges after 3 retries. UFW rules for ports
      80/443 were NOT applied — the server will not be reachable via Cloudflare.
      Check connectivity to www.cloudflare.com, then re-run with --tags base.
      If using Tailscale instead of Cloudflare, set reverse_proxy: tailscale.
  when:
    - cf_ipv4 is failed
    - reverse_proxy != 'tailscale'

- name: Fetch Cloudflare IPv6 ranges
  ansible.builtin.uri:
    url: https://www.cloudflare.com/ips-v6
    return_content: true
    timeout: 30
  register: cf_ipv6
  retries: 3
  delay: 5
  until: cf_ipv6 is not failed
  when: not (disable_ipv6 | bool)
  ignore_errors: "{{ reverse_proxy == 'tailscale' }}"

- name: Allow Cloudflare IPv4 ingress on 80,443
  community.general.ufw:
    rule: allow
    from_ip: "{{ item }}"
    to_port: "80,443"
    proto: tcp
  loop: "{{ cf_ipv4.content.split('\n') | select('match', '.+') | list }}"
  when: cf_ipv4 is succeeded

- name: Allow Cloudflare IPv6 ingress on 80,443
  community.general.ufw:
    rule: allow
    from_ip: "{{ item }}"
    to_port: "80,443"
    proto: tcp
  loop: "{{ cf_ipv6.content.split('\n') | select('match', '.+') | list }}"
  when: not (disable_ipv6 | bool) and cf_ipv6 is succeeded

- name: Enable UFW
  community.general.ufw:
    state: enabled

# ── Tailscale (Optional, via official APT repo — GPG-signed packages) ───
- name: Install Tailscale
  when: tailscale_enabled | bool
  block:
    - name: Download Tailscale GPG key
      ansible.builtin.get_url:
        url: "https://pkgs.tailscale.com/stable/ubuntu/{{ ansible_distribution_release }}.noarmor.gpg"
        dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
        mode: "0644"
        force: false
      retries: 3
      delay: 5
      register: tailscale_gpg_download
      until: tailscale_gpg_download is not failed

    - name: Add Tailscale APT repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg]
          https://pkgs.tailscale.com/stable/ubuntu {{ ansible_distribution_release }} main
        state: present
        filename: tailscale

    - name: Install Tailscale (pinned version)
      ansible.builtin.apt:
        name: "tailscale={{ tailscale_version }}"
        state: present
        update_cache: true

    - name: Allow SSH from Tailscale CGNAT range
      community.general.ufw:
        rule: allow
        from_ip: "100.64.0.0/10"
        to_port: "{{ ssh_port }}"
        proto: tcp

    - name: Remove public admin IP SSH rule (Tailscale replaces it)
      community.general.ufw:
        rule: limit
        from_ip: "{{ admin_ip }}"
        to_port: "{{ ssh_port }}"
        proto: tcp
        delete: true

    - name: Remind operator to run tailscale up
      ansible.builtin.debug:
        msg: >
          Tailscale is installed but not authenticated.
          SSH into the server and run: sudo tailscale up

# ── Disable IPv6 (Optional) ──────────────────────────────────────────
- name: Disable IPv6 in UFW
  ansible.builtin.lineinfile:
    path: /etc/default/ufw
    regexp: "^IPV6="
    line: "IPV6=no"
  notify: Reload ufw
  when: disable_ipv6 | bool

# ── Flush handlers to apply Docker restart before later roles ─────────
- name: Flush handlers
  ansible.builtin.meta: flush_handlers
