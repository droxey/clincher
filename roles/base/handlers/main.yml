---
- name: Reload ssh
  ansible.builtin.systemd:
    name: ssh
    state: reloaded

- name: Restart docker
  # enabled: true belongs in the installation task, not the restart handler.
  # Handlers should have a single responsibility.
  ansible.builtin.systemd:
    name: docker
    state: restarted

- name: Reload sysctl
  # sysctl --system reloads all /etc/sysctl.d/*.conf files at once.
  # ansible.posix.sysctl manages individual keys, not bulk file reloads.
  ansible.builtin.command: sysctl --system
  changed_when: true  # Handler only fires on notify — change is expected

- name: Restart fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: restarted

- name: Reload ufw
  community.general.ufw:
    state: reloaded
