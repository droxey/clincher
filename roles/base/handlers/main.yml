---
- name: Reload ssh
  ansible.builtin.systemd:
    name: ssh
    state: reloaded

- name: Restart docker
  ansible.builtin.systemd:
    name: docker
    state: restarted
    enabled: true

- name: Reload sysctl
  ansible.builtin.command: sysctl --system
  changed_when: true

- name: Restart fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: restarted
    enabled: true

- name: Reload ufw
  community.general.ufw:
    state: reloaded
