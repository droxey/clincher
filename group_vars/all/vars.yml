---
# ── Host ───────────────────────────────────────────────────────────────
deploy_user: deploy
ssh_port: 9922
admin_ip: "71.233.169.253"
openclaw_base_dir: /opt/openclaw
timezone: "America/New_York"
# Go template format string for docker inspect health checks.
# !unsafe prevents Ansible from interpreting the {{ }} as Jinja2.
docker_health_format: !unsafe "{{if .State.Health}}{{.State.Health.Status}}{{else}}running{{end}}"
domain: "claw.bots.ac"

# SSH key for Ansible → server auth (auto-generated on first run if missing).
# Used by the bootstrap play's manual SSH commands. Ansible's own SSH connection
# uses this key only AFTER bootstrap has generated it and pushed it to the server.
local_ssh_key_path: "{{ lookup('env', 'HOME') }}/.ssh/clincher_ed25519"

# ── Image Versions (pinned) ───────────────────────────────────────────
openclaw_version: "2026.3.13"
docker_proxy_version: "v0.4.2"
# Smokescreen is built from source (no pre-built image).
# Pin to the COMMIT SHA (not the tag) for reproducible builds — git tags can be force-pushed.
# SHA below is the commit for the v0.0.4 tag. To verify:
#   git ls-remote https://github.com/stripe/smokescreen refs/tags/v0.0.4
smokescreen_commit: "1dca4519091993661e52ab18b370b2024078f75a"
# Pin builder and runtime to patch-level tags for reproducible layer IDs.
smokescreen_go_version: "1.22.12"
smokescreen_alpine_version: "3.20.6"
litellm_version: "main-v1.81.3-stable"
redis_version: "7.4.0-v3"
# Pin Caddy to a specific patch release — "2-alpine" is a floating tag.
caddy_version: "2.8.4-alpine"
cloudflared_version: "2026.2.0"

# ── Host Package Versions (pinned) ────────────────────────────────────
# Pin to the exact Ubuntu package epoch:version string. To find the current
# version on the target host: apt-cache policy docker-ce
docker_ce_version: "5:27.5.1-1~ubuntu.24.04~noble"
# To find: apt-cache policy tailscale (after adding the APT repo)
tailscale_version: "1.78.1"
# To find versions: apt-cache policy containerd.io (etc.) — after adding Docker APT repo.
# These must be compatible with docker_ce_version above. Check Docker release notes
# when updating: https://docs.docker.com/engine/release-notes/
containerd_version: "1.7.27-1"
docker_buildx_version: "0.31.1-1~ubuntu.24.04~noble"
docker_compose_plugin_version: "2.32.4-1~ubuntu.24.04~noble"

# ── Docker Daemon ─────────────────────────────────────────────────────
docker_log_max_size: "10m"
docker_log_max_file: "3"
docker_dns:
  - "1.1.1.1"
  - "8.8.8.8"
docker_max_concurrent_downloads: 4
docker_max_concurrent_uploads: 2

# ── System Tuning ─────────────────────────────────────────────────────
swappiness: 10
inotify_max_watches: 524288
inotify_max_instances: 512
somaxconn: 1024

# ── Egress Whitelist (Smokescreen ACL) ───────────────────────────────
# Smokescreen uses glob patterns: "*.example.com" matches subdomains.
# Every domain added is a potential data exfiltration channel.
egress_allowed_domains:
  - "*.anthropic.com"
  - "*.openai.com"
  - "*.voyageai.com"
egress_extra_domains:
  - "*.groq.com"
  - "*.googleapis.com"
  - "*.x.ai"

# ── LiteLLM ──────────────────────────────────────────────────────────
litellm_models:
  - name: "anthropic/claude-opus-4-6"
    model: "claude-opus-4-6"
    key_env: "ANTHROPIC_API_KEY"
    max_budget: 100.0
    rpm: 60
  - name: "anthropic/claude-sonnet-4-6"
    model: "claude-sonnet-4-6"
    key_env: "ANTHROPIC_API_KEY"
    max_budget: 50.0
    rpm: 120
  - name: "anthropic/claude-haiku-4-5"
    model: "claude-haiku-4-5"
    key_env: "ANTHROPIC_API_KEY"
    max_budget: 20.0
    rpm: 300

litellm_cache_ttl: 3600
litellm_similarity_threshold: 0.8
redis_maxmemory: "256mb"
# Optional Redis password for defense-in-depth. When empty (default),
# Redis runs without authentication (current behavior, safe because
# openclaw-net is internal). Set a value in vault.yml to enable AUTH.
# Generate with: openssl rand -hex 32
redis_password: "6385bd3117aa1cb7b63925c9caf143e6fd4a7293e989a9069e23ea8a1579c8e4"

# ── OpenClaw Hardening ────────────────────────────────────────────────
openclaw_default_model: "anthropic/claude-opus-4-6"
openclaw_heartbeat_model: "anthropic/claude-haiku-4-5"
openclaw_max_tokens: 4096
# Optional extra env vars passed into the OpenClaw container via /opt/openclaw/.env.
# Use this for integrations that need runtime credentials or endpoints (for example,
# Clawtomaton's BASE_RPC_URL and optional feature-specific API keys).
openclaw_extra_env: {}

# Sandbox
sandbox_memory_limit: "1g"
sandbox_memory_swap: "1536m"
sandbox_cpu_limit: "1.0"
sandbox_pids_limit: 512
sandbox_max_concurrent: 8
sandbox_idle_hours: 12
sandbox_max_age_days: 3

# Container resource limits (tuned for 16 vCPU / 64 GB RAM host)
openclaw_cpus: "8.0"
openclaw_memory: "16G"
openclaw_memory_reservation: "4G"
docker_proxy_cpus: "0.5"
docker_proxy_memory: "256M"
smokescreen_cpus: "0.5"
smokescreen_memory: "128M"
litellm_cpus: "2.0"
litellm_memory: "2G"
redis_cpus: "0.5"
redis_memory: "512M"

# Tool denials
openclaw_agent_tool_denials:
  - process
  - browser
  - nodes
  - gateway
  - sessions_spawn
  - sessions_send
  - elevated
  - host_exec
  - docker
  - camera
  - canvas
  - cron

openclaw_gateway_tool_denials:
  - sessions_spawn
  - sessions_send
  - gateway
  - elevated
  - host_exec
  - docker
  - camera
  - canvas
  - cron

# ── Agency Agents (Prompt Library) ────────────────────────────────────
# 61 AI agent personas from https://github.com/msitarzewski/agency-agents
# Deployed as markdown prompt files into /root/.openclaw/agents/
agency_agents_enabled: true
agency_agents_repo: "https://github.com/msitarzewski/agency-agents.git"
# Pin to commit SHA for reproducible deploys — git tags can be force-pushed.
# SHA below is the HEAD of main as of 2026-03-08. To update:
#   git ls-remote https://github.com/msitarzewski/agency-agents refs/heads/main
agency_agents_version: "6254154899f510eb4a4de10561fecfc1f32ff17f"
# Which agent divisions to install (all 9 available):
agency_agents_divisions:
  - engineering
  - design
  - marketing
  - product
  - project-management
  - testing
  - support
  - spatial-computing
  - specialized

# ── Vendor Skills (from awesome-agent-skills) ─────────────────────────
# Official skills from Anthropic, Vercel, Stripe, Cloudflare, HashiCorp, and
# Google Workspace. Sourced via https://github.com/VoltAgent/awesome-agent-skills
# Each entry defines the repo URL, pinned commit SHA, and the subdirectory within
# the repo that contains individual skill folders.
# Deployed into /root/.openclaw/agents/vendor/<name>/ inside the container.
# Pin to commit SHA for reproducible deploys — git tags can be force-pushed.
vendor_skills_enabled: true
vendor_skills:
  - name: anthropic
    repo: "https://github.com/anthropics/skills.git"
    # SHA is HEAD of main as of 2026-03-06. To update:
    #   git ls-remote https://github.com/anthropics/skills refs/heads/main
    version: "b0cbd3df1533b396d281a6886d5132f623393a9c"
    subdir: "skills"
  - name: vercel
    repo: "https://github.com/vercel-labs/agent-skills.git"
    # SHA is HEAD of main as of 2026-03-06. To update:
    #   git ls-remote https://github.com/vercel-labs/agent-skills refs/heads/main
    version: "9aec8ee6aaf702e49312a071e672f1c1b7b7e948"
    subdir: "skills"
  - name: stripe
    repo: "https://github.com/stripe/ai.git"
    # SHA is HEAD of main as of 2026-03-05. To update:
    #   git ls-remote https://github.com/stripe/ai refs/heads/main
    version: "91f8471adfe5189145aaab61879bfa13452c51eb"
    subdir: "skills"
  - name: cloudflare
    repo: "https://github.com/cloudflare/skills.git"
    # SHA is HEAD of main as of 2026-03-03. To update:
    #   git ls-remote https://github.com/cloudflare/skills refs/heads/main
    version: "d3113039790f64e052ff80f351190da65e9b7510"
    subdir: "skills"
  - name: hashicorp
    repo: "https://github.com/hashicorp/agent-skills.git"
    # SHA is HEAD of main as of 2026-03-04. To update:
    #   git ls-remote https://github.com/hashicorp/agent-skills refs/heads/main
    version: "9f2ede91f6eb72780c5fd787b3b1720623626dfb"
    subdir: "terraform"
  - name: google-workspace
    repo: "https://github.com/googleworkspace/cli.git"
    # SHA is HEAD of main as of 2026-03-09. To update:
    #   git ls-remote https://github.com/googleworkspace/cli refs/heads/main
    version: "e9970db26fb32ca97f11ce0d8c7c53e4eedd81cc"
    subdir: "skills"

# ── Agent Orchestrator (Multi-Agent Coordination) ──────────────────────
# Manages parallel AI agents with isolated worktrees, auto-CI-fix, and dashboard.
# Source: https://github.com/ComposioHQ/agent-orchestrator
# Dashboard accessible only via SSH tunnel or reverse proxy (never direct internet).
agent_orchestrator_enabled: true
agent_orchestrator_repo: "https://github.com/ComposioHQ/agent-orchestrator.git"
# Pin to commit SHA for reproducible deploys — git tags can be force-pushed.
# SHA below is HEAD of main as of 2026-03-10. To update:
#   git ls-remote https://github.com/ComposioHQ/agent-orchestrator refs/heads/main
agent_orchestrator_version: "feb691e0b756c47e1bd7f14c9a0c8cb606d9a7f3"
agent_orchestrator_pnpm_version: "10.6.5"
agent_orchestrator_port: 3000
agent_orchestrator_runtime: "docker"
agent_orchestrator_agent: "claude-code"
agent_orchestrator_max_concurrent: 5
agent_orchestrator_auto_merge: false
# github_token lives in vault.yml

# ── Channel ──────────────────────────────────────────────────────────
telegram_enabled: true
# telegram_bot_token lives in vault.yml

# ── Memory ───────────────────────────────────────────────────────────
memory_provider: "voyage"
memory_model: "voyage-3-large"

# ── Reverse Proxy ────────────────────────────────────────────────────
# Options: caddy | tunnel | tailscale
reverse_proxy: "tunnel"

# ── External Monitoring (Separate VPS) ────────────────────────────────
# Monitoring services (Prometheus, Grafana, Uptime Kuma) run on a
# separate VPS — never on the OpenClaw host. Deploy the external
# stack with: ansible-playbook caprover-playbook.yml
# See §13.2.1 in README.md for setup details.
external_monitoring_prometheus_url: "https://prometheus.dev.bots.ac"
external_monitoring_grafana_url: "https://grafana.dev.bots.ac"
external_monitoring_uptimekuma_url: "https://uptime.dev.bots.ac"

# ── Maintenance ──────────────────────────────────────────────────────
backup_retention_days: 14
log_retention_days: 30
backup_cron_hour: 3
backup_cron_minute: 0
token_rotation_day: 1
token_rotation_hour: 4
watchdog_interval: 5
watchdog_restart_threshold: 3
watchdog_disk_threshold: 85
watchdog_memory_threshold: 90

# ── Unattended Upgrades ─────────────────────────────────────────────
auto_reboot: true
auto_reboot_time: "05:00"

# ── Convenience ──────────────────────────────────────────────────────
# Shell aliases (oc-status, oc-logs, oc-backup, etc.) in /etc/profile.d/
convenience_aliases: true
# Web-based file manager at https://<domain>/files/
filebrowser_enabled: true
filebrowser_version: "v2.32.0"
filebrowser_cpus: "0.5"
filebrowser_memory: "64M"
# Shared directory between host and OpenClaw container
uploads_dir: "{{ openclaw_base_dir }}/uploads"
# Same-server monitoring (Grafana reverse proxy path in Caddy).
# Always false — monitoring runs on a separate VPS via caprover-playbook.yml.
monitoring_enabled: false

# ── Tailscale (Optional) ────────────────────────────────────────────
tailscale_enabled: false

# ── IPv6 ─────────────────────────────────────────────────────────────
disable_ipv6: false
