---
name: CI

"on":
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secrets:
    name: Secret Scan
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Run yamllint
        run: yamllint .

      - name: Run ansible-lint
        run: ansible-lint

  syntax:
    name: Syntax Check
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Run syntax check (main playbook)
        run: ansible-playbook playbook.yml --syntax-check

      - name: Run syntax check (caprover playbook)
        run: ansible-playbook caprover-playbook.yml --syntax-check

  molecule:
    name: "Molecule (${{ matrix.role || matrix.scenario }})"
    runs-on: ubuntu-24.04
    needs: [lint, syntax]
    strategy:
      fail-fast: false
      matrix:
        include:
          - scenario: default
            role: ""
          - scenario: default
            role: base
          - scenario: default
            role: openclaw-config
          - scenario: default
            role: openclaw-harden
          - scenario: default
            role: reverse-proxy
          - scenario: default
            role: maintenance
          - scenario: default
            role: convenience
          - scenario: caprover
            role: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Run Molecule (project-level)
        if: matrix.role == ''
        run: molecule test -s ${{ matrix.scenario }}
        env:
          ANSIBLE_FORCE_COLOR: "1"

      - name: Run Molecule (role-level)
        if: matrix.role != ''
        run: molecule test
        working-directory: "roles/${{ matrix.role }}"
        env:
          ANSIBLE_FORCE_COLOR: "1"

  docker:
    name: Docker Build and Push
    runs-on: ubuntu-24.04
    needs: [lint, syntax, molecule, secrets]
    if: vars.DOCKERHUB_USERNAME != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: cloud
          endpoint: "droxey/clincher"
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/clincher:latest
            ${{ vars.DOCKERHUB_USERNAME }}/clincher:test
          # For pull requests, export results to the build cache.
          # Otherwise, push to a registry.
          outputs: ${{ github.event_name == 'pull_request' && 'type=cacheonly' || 'type=registry' }}
