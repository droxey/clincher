[defaults]
inventory = inventory/hosts.yml
roles_path = roles
# Use ~/.ansible/tmp rather than /tmp — the ${USER} shell variable is not
# expanded by Ansible's config parser, and /tmp is world-readable at the
# directory level.
remote_tmp = ~/.ansible/tmp
forks = 5
timeout = 30
pipelining = true
stdout_callback = default
result_format = yaml
callbacks_enabled = profile_tasks

# Retry failed hosts once (useful for transient SSH issues on fresh VPS)
retry_files_enabled = true
retry_files_save_path = .retry

# To run without --ask-vault-pass, point this at your vault password file:
# vault_password_file = ~/.ansible/vault_password

[privilege_escalation]
become = true
become_method = sudo
become_user = root

[ssh_connection]
# ControlPersist=300s: keeps the SSH master socket alive for 5 min after last use.
# 60s was too short for smokescreen's multi-stage Go build (can take 3-5 min),
# causing "Connection closed" errors on the task immediately after the build.
#
# SECURITY: StrictHostKeyChecking=accept-new auto-accepts host keys on first
# connection. Before running the bootstrap play against a new server, verify
# the SSH fingerprint out-of-band (e.g. via the VPS provider console):
#   ssh-keyscan -p 22 <SERVER_IP> | ssh-keygen -lf -
# Then add it to known_hosts: ssh-keyscan -p 22 <SERVER_IP> >> ~/.ssh/known_hosts
# After that, change accept-new to yes for subsequent runs.
ssh_args = -o ControlMaster=auto -o ControlPersist=300s -o StrictHostKeyChecking=accept-new -o IdentitiesOnly=yes
